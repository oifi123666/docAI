<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML PPT 生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        input[type="text"],
        textarea,
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: monospace;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }
        button {
            flex: 1;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-download {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-preview {
            background: #f0f0f0;
            color: #333;
        }
        .btn-preview:hover {
            background: #e0e0e0;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hint {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        .hint code {
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 HTML PPT 生成器</h1>
        <p class="subtitle">填写以下信息，一键生成精美的演示文稿</p>
        
        <form id="pptForm">
            <div class="form-group">
                <label for="title">📌 标题</label>
                <input type="text" id="title" placeholder="例如：我的演示文稿" value="我的演示文稿">
            </div>
            
            <div class="form-group">
                <label for="theme">🎨 主题</label>
                <select id="theme">
                    <option value="tokyo-night">Tokyo Night（深色）</option>
                    <option value="corporate-clean">Corporate Clean（浅色）</option>
                    <option value="minimal-white">Minimal White（极简白）</option>
                    <option value="dracula">Dracula</option>
                    <option value="catppuccin-mocha">Catppuccin Mocha</option>
                    <option value="cyberpunk-neon">Cyberpunk Neon</option>
                    <option value="aurora">Aurora</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="model">🤖 AI模型</label>
                <select id="model">
                    <option value="qwen3.6-plus">通义千问 3.6 Plus</option>
                    <option value="glm-5">智谱 GLM-5</option>
                    <option value="kimi-k2.5">月之暗面 Kimi K2.5</option>
                    <option value="MiniMax-M2.5">MiniMax M2.5</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="outline">📝 大纲（每行一个章节）</label>
                <textarea id="outline" placeholder="产品介绍
核心功能
技术架构
演示展示
总结展望">产品介绍
核心功能
技术架构
演示展示
总结展望</textarea>
            </div>
            
            <div class="btn-group">
                <button type="button" class="btn-download" onclick="downloadPPT()">💾 下载 PPT</button>
            </div>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在生成中，请稍候...</p>
        </div>
        
        <div class="hint">
            <strong>💡 提示：</strong>
            <ul style="margin-top: 10px; padding-left: 20px;">
                <li>每行一个章节，会自动生成对应内容</li>
                <li>生成的 HTML 文件可以直接在浏览器打开演示</li>
                <li>按 <code>←</code> <code>→</code> 键翻页，按 <code>S</code> 键打开演讲者模式</li>
            </ul>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin || 'http://localhost:8083';
        
        function getFormData() {
            return {
                outline: document.getElementById('outline').value,
                theme: document.getElementById('theme').value,
                title: document.getElementById('title').value,
                model: document.getElementById('model').value
            };
        }
        
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
        
        async function downloadPPT() {
            const data = getFormData();
            showLoading(true);
            
            try {
                const response = await fetch(`${API_BASE}/api/skills/html-ppt/download`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                if (!response.ok) {
                    throw new Error('生成失败');
                }
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (data.title || 'presentation').replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_') + '.html';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
            } catch (error) {
                alert('生成失败：' + error.message);
            } finally {
                showLoading(false);
            }
        }
    </script>
</body>
</html>
