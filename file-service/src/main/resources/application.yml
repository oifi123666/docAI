spring:
  application:
    name: file
  
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:infra_mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:doc_ai}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        enabled: true
        server-addr: nacos:8848
        namespace: public
        timeout: 30000
      client:
        namespace: public
        timeout: 30000

  data:
    redis:
      host: ${REDIS_HOST:infra_redis}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 1
      timeout: 10000
      lettuce:
        pool:
          max-active: 8
          max-wait: -1
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: ${RABBITMQ_HOST:infra_rabbitmq}
    port: 5672
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: /
    listener:
      simple:
        concurrency: 1
        max-concurrency: 10
        prefetch: 1
        auto-startup: true
        default-requeue-rejected: true

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 1024MB
      max-request-size: 1024MB

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.javaee.fileservice.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8082
  servlet:
    context-path: /

minio:
  endpoint: ${MINIO_ENDPOINT:http://infra_minio:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: doc-ai
  # bucket=permissionGroup1,permissionGroup2; another-bucket=groupA
  # JWT 中的 role 会作为默认权限组；可额外通过 permissionGroups/groups claim 扩展。
  bucket-permissions: "doc-ai=admin,user"
  bucket-permission-default-allow: false
  secure: false

file:
  storage:
    type: minio
    local-path: /data/file-storage
    max-size: 1024
    allowed-types:
      - image/*
      - application/pdf
      - application/msword
      - application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - application/vnd.ms-excel
      - application/vnd.openxmlformats-officedocument.spreadsheetml.sheet
      - application/vnd.ms-powerpoint
      - application/vnd.openxmlformats-officedocument.presentationml.presentation
      - text/*

logging:
  level:
    com.javaee.fileservice: debug
    org.springframework.security: info

custom:
  jwt:
    header: Authorization
    prefix: Bearer
